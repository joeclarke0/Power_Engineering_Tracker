<svg viewBox="0 0 34 34" width="34" height="34" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Joe.com logo — "J" data-pipeline mark -->
  <!-- Dark rounded background -->
  <rect width="34" height="34" rx="8" fill="#27272a"/>
  <!-- J stroke path: vertical stem curving into hook -->
  <path d="M 22 7 L 22 22 Q 22 28 16 28 Q 10 28 10 23"
    stroke="white" stroke-width="2.6" stroke-linecap="round"
    stroke-linejoin="round" fill="none"/>
  <!-- Source node (top of J) -->
  <circle cx="22" cy="7" r="3.2" fill="white"/>
  <!-- Mid-flow node (faint) -->
  <circle cx="22" cy="16" r="1.8" fill="white" fill-opacity="0.32"/>
  <!-- Destination node (end of hook) — green matches "Done" status -->
  <circle cx="10" cy="23" r="3.2" fill="#10b981"/>
</svg>
